name: blastmini CI

# 触发条件：当推送到 main 分支，或有人发起 Pull Request 时
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]  # 测试多个 Python 版本，增强兼容性

    steps:
    # 1. 拉取代码
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. 设置 Python 环境
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    # 3. 安装依赖（这里直接依赖 pyproject.toml）
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[test]   # 安装包本身 + 测试依赖 (pytest, pytest-cov)
        pip install flake8       # 安装代码检查工具

    # 4. 运行 Lint (静态检查)
    - name: Lint with flake8
      run: |
        # 停止构建如果有语法错误或未定义的名称
        flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # 检查代码风格（允许行长度 120，因为生物信息常有长字符串）
        flake8 src/ tests/ --count --max-line-length=120 --statistics

    # 5. 运行 Pytest (单元测试)
    - name: Test with pytest
      run: |
        pytest tests/ --cov=blastmini --cov-report=term-missing